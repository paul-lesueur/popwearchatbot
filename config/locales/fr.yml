fr:
  # Messages de validation génériques (ActiveModel / ActiveRecord)
  errors:
    format: "%{attribute} %{message}"
    messages:
      accepted: "doit être accepté(e)"
      blank: "doit être rempli(e)"
      confirmation: "ne concorde pas avec %{attribute}"
      empty: "doit être rempli(e)"
      equal_to: "doit être égal à %{count}"
      exclusion: "n'est pas disponible"
      greater_than: "doit être supérieur à %{count}"
      greater_than_or_equal_to: "doit être supérieur ou égal à %{count}"
      inclusion: "n'est pas inclus(e) dans la liste"
      invalid: "n'est pas valide"
      less_than: "doit être inférieur à %{count}"
      less_than_or_equal_to: "doit être inférieur ou égal à %{count}"
      not_a_number: "n'est pas un nombre"
      not_an_integer: "doit être un entier"
      other_than: "doit être différent de %{count}"
      present: "doit être vide"
      required: "doit exister"
      taken: "est déjà utilisé(e)"
      too_long:
        one: "est trop long (pas plus d'un caractère)"
        other: "est trop long (pas plus de %{count} caractères)"
      too_short:
        one: "est trop court (au moins un caractère)"
        other: "est trop court (au moins %{count} caractères)"
      wrong_length:
        one: "ne fait pas la bonne longueur (doit comporter un seul caractère)"
        other: "ne fait pas la bonne longueur (doit comporter %{count} caractères)"

  activerecord:
    errors:
      messages:
        record_invalid: "La validation a échoué : %{errors}"
        restrict_dependent_destroy:
          has_one: "Vous ne pouvez pas supprimer cet enregistrement car un(e) %{record} en dépend"
          has_many: "Vous ne pouvez pas supprimer cet enregistrement car des %{record} en dépendent"
    models:
      deadline: "Échéance"
      user: "Utilisateur"
    attributes:
      deadline:
        title: "Titre"
        description: "Description"
        category: "Catégorie"
        due_date: "Date d'échéance"
        status: "Statut"
        estimated_duration: "Durée estimée"
      user:
        email: "E-mail"
        password: "Mot de passe"
        password_confirmation: "Confirmation du mot de passe"
        current_password: "Mot de passe actuel"
        first_name: "Prénom"
        last_name: "Nom"
        company_name: "Nom de l'entreprise"
        phone: "Téléphone"

  # Formats de date/heure en français (utilisés par le helper l()).
  date:
    abbr_day_names: [dim, lun, mar, mer, jeu, ven, sam]
    abbr_month_names: [~, janv., févr., mars, avr., mai, juin, juil., août, sept., oct., nov., déc.]
    day_names: [dimanche, lundi, mardi, mercredi, jeudi, vendredi, samedi]
    month_names: [~, janvier, février, mars, avril, mai, juin, juillet, août, septembre, octobre, novembre, décembre]
    formats:
      default: "%d/%m/%Y"
      long: "%-d %B %Y"
      short: "%-d %b"
  time:
    am: "am"
    pm: "pm"
    formats:
      default: "%-d %B %Y %Hh%M"
      long: "%A %-d %B %Y %Hh%M"
      short: "%-d %b %Hh%M"
